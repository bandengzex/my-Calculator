name: Cleanup Caches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # 每周日清理一次

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Cleanup caches
      run: |
        gh cache list
        gh cache delete --all || true
      env:
        GH_TOKEN: ${{ github.token }}
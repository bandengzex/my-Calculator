name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug
        - check
      clean_cache:
        description: 'Clean cache first'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Clean cache (if requested)
      if: github.event.inputs.clean_cache == 'true'
      run: |
        rm -rf ~/.gradle/caches
        rm -rf ~/.gradle/wrapper
      
    - name: Cache Gradle packages
      if: github.event.inputs.clean_cache != 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run checks
      if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.build_type == 'check'
      run: ./gradlew check
      
    - name: Build Debug APK
      if: github.event.inputs.build_type == 'debug' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      if: github.event.inputs.build_type == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      run: ./gradlew assembleRelease
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ github.event.inputs.build_type || 'release' }}-${{ github.sha }}
        path: app/build/outputs/apk/*/
        
    - name: Upload build reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports-${{ github.event.inputs.build_type || 'release' }}-${{ github.sha }}
        path: |
          app/build/reports/
          app/build/test-results/
